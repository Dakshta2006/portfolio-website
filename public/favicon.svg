<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Color Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#121214" />
      <stop offset="100%" stop-color="#18181c" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#9d4edd" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#39ff14" />
    </linearGradient>

    <!-- Filters for Glow Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="deepGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40" result="blur" />
    </filter>
  </defs>

  <!-- Deep background ambient glow -->
  <rect x="96" y="96" width="320" height="320" rx="80" fill="url(#glowGrad)" opacity="0.25" filter="url(#deepGlow)" />

  <!-- Base Card Container -->
  <rect x="64" y="64" width="384" height="384" rx="88" fill="url(#bgGrad)" stroke="url(#glowGrad)" stroke-width="12" />

  <!-- Sub-grid lines matching the website's grid layout theme -->
  <!-- Vertical lines -->
  <line x1="128" y1="160" x2="128" y2="448" stroke="rgba(0, 240, 255, 0.06)" stroke-width="2" />
  <line x1="192" y1="160" x2="192" y2="448" stroke="rgba(0, 240, 255, 0.06)" stroke-width="2" />
  <line x1="256" y1="160" x2="256" y2="448" stroke="rgba(0, 240, 255, 0.06)" stroke-width="2" />
  <line x1="320" y1="160" x2="320" y2="448" stroke="rgba(0, 240, 255, 0.06)" stroke-width="2" />
  <line x1="384" y1="160" x2="384" y2="448" stroke="rgba(0, 240, 255, 0.06)" stroke-width="2" />
  
  <!-- Horizontal lines -->
  <line x1="64" y1="224" x2="448" y2="224" stroke="rgba(0, 240, 255, 0.06)" stroke-width="2" />
  <line x1="64" y1="288" x2="448" y2="288" stroke="rgba(0, 240, 255, 0.06)" stroke-width="2" />
  <line x1="64" y1="352" x2="448" y2="352" stroke="rgba(0, 240, 255, 0.06)" stroke-width="2" />
  <line x1="64" y1="416" x2="448" y2="416" stroke="rgba(0, 240, 255, 0.06)" stroke-width="2" />

  <!-- Terminal Window Top Bar Divider -->
  <path d="M64 160 H448" stroke="rgba(0, 240, 255, 0.18)" stroke-width="4" />

  <!-- Terminal Action Dots (Mini Window controls) -->
  <circle cx="120" cy="112" r="10" fill="#f43f5e" opacity="0.85" />
  <circle cx="156" cy="112" r="10" fill="#ffa25b" opacity="0.85" />
  <circle cx="192" cy="112" r="10" fill="#39ff14" opacity="0.85" />

  <!-- Glowing Terminal Command text/details (subtle) -->
  <text x="340" y="120" font-family="'JetBrains Mono', monospace" font-size="22" font-weight="bold" fill="url(#accentGrad)" opacity="0.8" text-anchor="end">SYS_IN</text>

  <!-- Glowing Terminal Prompt: >_ -->
  <!-- The '>' symbol -->
  <path d="M 148 212 L 236 276 L 148 340" fill="none" stroke="url(#glowGrad)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
  
  <!-- The '_' cursor -->
  <line x1="264" y1="340" x2="356" y2="340" stroke="#00f0ff" stroke-width="28" stroke-linecap="round" filter="url(#glow)" />
</svg>